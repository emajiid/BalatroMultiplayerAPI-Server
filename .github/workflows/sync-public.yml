name: Sync to public repo

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  sync:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-filter-repo
        run: pip install git-filter-repo

      - name: Strip src/private/ from history
        run: git filter-repo --path src/private/ --invert-paths --force

      - name: Push to public repo
        run: |
          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/Balatro-Multiplayer/BalatroMultiplayerAPI-Server.git
          git push public mqtt:mqtt --force
