services:
  emqx:
    image: emqx/emqx:5.8
    container_name: bmp-emqx
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8883:8883"
      - "18083:18083"
    environment:
      EMQX_NAME: bmp-emqx
    volumes:
      - ./apps/server/emqx/cluster.hocon:/opt/emqx/etc/cluster.hocon:ro
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    healthcheck:
      test: ["CMD", "emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bmp

  postgres:
    image: postgres:16-alpine
    container_name: bmp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bmp
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - bmp

  moderation:
    build:
      context: ./apps/moderation
      dockerfile: Dockerfile
    container_name: bmp-moderation
    ports:
      - "8001:8001"
    environment:
      TOXICITY_THRESHOLD: "0.7"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - bmp

  api:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: bmp-api
    ports:
      - "8788:8788"
    env_file: ./apps/server/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bmp
      EMQX_BROKER_URL: mqtt://emqx:1883
      MODERATION_SERVICE_URL: http://moderation:8001
    depends_on:
      emqx:
        condition: service_healthy
      postgres:
        condition: service_healthy
      moderation:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bmp

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: bmp-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - bmp

networks:
  bmp:
    name: bmp

volumes:
  emqx-data:
  emqx-log:
  pg-data:
